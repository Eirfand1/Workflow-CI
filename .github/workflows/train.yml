name: CI - Train Model

on:
  push:
    branches:
      - main
    paths:
      - '.'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      - name: Install Dependencies
        run: |
          pip install mlflow==2.19.0 pandas numpy scikit-learn matplotlib

      - name: Run MLflow Project
        run: |
          mlflow run MLProject/ --env-manager=local

      - name: Upload Artifacts to GitHub
        run: |
          cp -r MLProject/artifacts . 2>/dev/null || true
          find . -name "mlruns" -maxdepth 2 -exec cp -r {} ./mlruns_ci \; 2>/dev/null || true

          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add artifacts/ mlruns_ci/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "ci: update model artifacts and mlruns [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
